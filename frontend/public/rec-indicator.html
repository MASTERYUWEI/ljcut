<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>LJCUT 錄製中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
        }

        .bar {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 100%;
            background: rgba(20, 20, 28, 0.92);
            border: 1px solid rgba(255, 59, 48, 0.5);
            border-radius: 12px;
            padding: 0 14px;
            -webkit-app-region: drag;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3b30;
            animation: pulse 1.2s infinite;
            flex: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.25;
            }
        }

        .timer {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 50px;
        }

        .hint {
            color: rgba(255, 255, 255, 0.55);
            font-size: 11px;
            white-space: nowrap;
        }

        .stop {
            -webkit-app-region: no-drag;
            margin-left: auto;
            background: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .stop:hover {
            background: #e0342b;
        }
    </style>
</head>

<body>
    <div class="bar">
        <span class="dot"></span>
        <span class="timer" id="t">0:00</span>
        <span class="hint">F10 結束</span>
        <button class="stop" id="stop">停止</button>
    </div>
    <script>
        let s = 0;
        const t = document.getElementById('t');
        const fmt = n => Math.floor(n / 60) + ':' + String(n % 60).padStart(2, '0');
        setInterval(() => { s++; t.textContent = fmt(s); }, 1000);
        document.getElementById('stop').addEventListener('click', async () => {
            try { await window.__TAURI_INTERNALS__.invoke('stop_recording'); } catch (e) { }
        });
    </script>
</body>

</html>
